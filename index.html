<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="description" content="Рыба ест рыбу — браузерный аркадный симулятор: растите, ешьте, плодите союзников и зачистите карту." />
  <meta name="theme-color" content="#0a84ff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <title>Рыба ест рыбу</title>
  <!-- Yandex Games SDK (загружается с хоста платформы при публикации в Я.Игры) -->
  <script src="/sdk.js"></script>
  <style>
    :root {
      --bg: #f6f7fb;
      --surface: #ffffff;
      --surface-soft: #fafbfd;
      --border: #e6e8ee;
      --border-strong: #d8dce5;
      --text: #1c1d22;
      --text-muted: #6b7280;
      --accent: #0a84ff;
      --accent-soft: #e8f1ff;
      --warn: #ff9f0a;
      --warn-soft: #fff4e1;
      --danger: #ff3b30;
      --success: #34c759;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow-md: 0 6px 24px rgba(15, 23, 42, 0.08);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
      font-size: 14px;
      height: 100vh;
      height: 100dvh; /* учёт мобильного UI (адресная строка и т.п.) */
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      overscroll-behavior: none;
    }

    /* ===== Header ===== */
    .app-header {
      display: flex;
      align-items: center;
      gap: 12px;
      height: 44px;
      padding: 0 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }


    .header-stats {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
      margin-left: 8px;
    }

    .size-block {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 220px;
    }

    .size-label {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.2px;
      text-transform: uppercase;
    }


    .size-value {
      font-variant-numeric: tabular-nums;
      font-size: 13px;
      color: var(--text);
      min-width: 70px;
      text-align: right;
    }

    .badges {
      display: flex;
      gap: 6px;
      margin-left: 4px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
      background: var(--surface-soft);
      color: var(--text-muted);
      border: 1px solid var(--border);
      transition: all 0.15s ease;
    }

    .badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .badge.is-active {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: transparent;
    }

    .badge.is-warn {
      background: var(--warn-soft);
      color: var(--warn);
      border-color: transparent;
    }

    .badge.is-boost {
      background: #e0f0ff;
      color: #0a78d8;
      border-color: transparent;
    }

    .badge[hidden] { display: none; }

    .icon-btn {
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .icon-btn:hover {
      background: var(--surface-soft);
      border-color: var(--border);
      color: var(--text);
    }

    .icon-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .icon-btn svg { width: 18px; height: 18px; }

    /* ===== Main game area ===== */
    .game-area {
      flex: 1;
      display: flex;
      gap: 10px;
      padding: 4px 10px 8px;
      min-height: 0;
    }

    .canvas-wrap {
      flex: 1;
      min-width: 0;
      min-height: 0;
      position: relative;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 55%),
        linear-gradient(180deg, #d6ecff 0%, #b1d6ff 45%, #6fa7e8 100%);
      border: 1px solid #b6d3ee;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm), inset 0 0 80px rgba(10,80,160,0.18);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.6s ease, box-shadow 0.4s ease;
    }
    .canvas-wrap.is-dead {
      box-shadow: var(--shadow-sm), inset 0 0 100px rgba(216,35,15,0.45);
    }

    /* Канвас динамически подгоняется под контейнер из JS */
    #gameCanvas {
      display: block;
      background: transparent;
      touch-action: none;
      max-width: 100%;
      max-height: 100%;
    }

    /* Лог скрыт по умолчанию, показывается только в режиме отладки. */
    .log-panel {
      display: none;
      width: 240px;
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      flex-direction: column;
      overflow: hidden;
      order: -1;
    }
    body.is-debug-on .log-panel { display: flex; }
    body.is-layout-swapped .log-panel { order: 1; }
    body.is-layout-swapped .joystick { right: auto; left: 22px; }
    @media (max-width: 700px) {
      .log-panel { width: 100%; height: 130px; order: 1; }
      body.is-layout-swapped .log-panel { order: -1; }
    }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .log-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.1px;
    }

    .log-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      font-size: 12.5px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .log-body div { word-wrap: break-word; }
    .log-body .log-taunt {
      color: #d8230f;
      font-weight: 700;
      letter-spacing: 0.2px;
      text-shadow: 0 0 1px rgba(216,35,15,0.25);
    }

    /* ===== Settings panel (right slide-in) ===== */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.18);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 40;
    }
    .overlay.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* ===== Toolbar (in header) ===== */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .toolbar .divider {
      width: 1px;
      height: 22px;
      background: var(--border);
      margin: 0 4px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
      white-space: nowrap;
    }
    .pill:hover { background: var(--surface); border-color: var(--border-strong); color: var(--text); }
    .pill:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .pill.is-active {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: transparent;
    }
    .pill.is-active.warn {
      background: var(--warn-soft);
      color: var(--warn);
    }
    .pill .pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.6;
    }
    .pill.is-active .pill-dot { opacity: 1; }

    .kbd {
      display: inline-block;
      padding: 0 5px;
      font-size: 10.5px;
      font-family: 'SF Mono', Menlo, monospace;
      background: rgba(0,0,0,0.04);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      vertical-align: middle;
      line-height: 1.4;
    }
    .pill.is-active .kbd {
      background: rgba(255,255,255,0.5);
      border-color: transparent;
      color: inherit;
    }

    /* ===== Popovers ===== */
    /* По умолчанию поповер справа; rulesPopover переопределяется на лево. */
    .popover {
      position: absolute;
      top: 48px;
      right: 12px;
      width: 320px;
      max-height: calc(100dvh - 64px);
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      padding: 14px 16px 16px;
      z-index: 60;
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    #rulesPopover { right: auto; left: 12px; }
    .popover.is-open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .popover h3 {
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.1px;
      color: var(--text);
    }

    /* Rules content */
    .rules-text {
      font-size: 13px;
      line-height: 1.5;
      color: var(--text);
    }
    .rules-text p { margin: 0 0 10px; color: var(--text-muted); }
    .rules-text strong { font-weight: 600; color: var(--text); }
    .rules-text ul {
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .rules-text li {
      padding: 7px 0;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }
    .rules-text li::before {
      content: '';
      width: 4px;
      height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin-top: 8px;
      flex-shrink: 0;
    }

    /* Legend */
    .legend-list {
      padding: 0;
      margin: 0;
      list-style: none;
    }
    .legend-list li {
      padding: 0;
      font-size: 13px;
      color: var(--text);
      border-top: 1px solid var(--border);
    }
    .legend-list li:first-child { border-top: none; }
    .legend-list details {
      display: block;
    }
    .legend-list summary {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      cursor: pointer;
      list-style: none;
      user-select: none;
    }
    .legend-list summary::-webkit-details-marker { display: none; }
    .legend-list summary::after {
      content: '';
      width: 16px;
      height: 16px;
      margin-left: auto;
      border-radius: 50%;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      font-style: italic;
      font-family: 'Times New Roman', serif;
      line-height: 14px;
      text-align: center;
      flex-shrink: 0;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='7' fill='none' stroke='%236b7280' stroke-width='1.2'/><circle cx='8' cy='4.5' r='0.9' fill='%236b7280'/><path d='M8 7 L8 12' stroke='%236b7280' stroke-width='1.4' stroke-linecap='round'/></svg>");
      background-repeat: no-repeat;
      background-size: 14px 14px;
      background-position: center;
    }
    .legend-list details[open] summary::after {
      background-color: var(--accent-soft);
      border-color: transparent;
    }
    .legend-list .legend-desc {
      padding: 0 0 10px 26px;
      margin: 0 0 4px;
      font-size: 12.5px;
      color: var(--text-muted);
      line-height: 1.45;
    }
    .legend-swatch {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid transparent;
    }
    /* Безопасная рыба должна оставаться белой даже в системном тёмном режиме —
       без явного цвета браузерные dark-style фильтры могут инвертировать её в чёрную. */
    @media (prefers-color-scheme: dark) {
      .legend-list .legend-swatch {
        box-shadow: 0 0 0 1px var(--border) inset;
      }
    }
    .legend-swatch.is-bolt {
      border: none;
      border-radius: 0;
      background: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
    }
    .legend-swatch.is-bolt svg {
      width: 18px;
      height: 18px;
      display: block;
    }


    /* Кнопка-оверлей в центре канваса (старт игры / рестарт). */
    .overlay-btn {
      position: absolute;
      left: 50%;
      top: 62%;
      transform: translateX(-50%);
      padding: 14px 36px;
      background: #d8230f;
      color: #fff;
      border: 2px solid #b01b08;
      border-radius: 14px;
      font: 700 22px/1 -apple-system, "Helvetica Neue", sans-serif;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(216,35,15,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
      z-index: 40;
      user-select: none;
      -webkit-user-select: none;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }
    .overlay-btn:hover { background: #ff3b30; box-shadow: 0 10px 28px rgba(216,35,15,0.45); }
    .overlay-btn:active { transform: translateX(-50%) scale(0.96); }
    .overlay-btn[hidden] { display: none; }
    .retry-btn { top: 56%; }

    /* Виртуальный джойстик: 4 кнопки в форме плюса, поверх канваса */
    .joystick {
      position: absolute;
      right: 22px;
      bottom: 22px;
      display: grid;
      grid-template-columns: 40px 40px 40px;
      grid-template-rows: 40px 40px 40px;
      gap: 4px;
      z-index: 30;
      user-select: none;
      -webkit-user-select: none;
      pointer-events: auto;
    }
    .joystick button {
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      padding: 0;
      touch-action: none;
      box-shadow: var(--shadow-sm);
      transition: background 0.12s ease, color 0.12s ease, transform 0.06s ease;
    }
    .joystick button:hover { background: rgba(255,255,255,0.95); color: var(--text); }
    .joystick button:active,
    .joystick button.is-pressed {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
      transform: scale(0.95);
    }
    .joystick button svg { width: 18px; height: 18px; }
    .joystick .j-up    { grid-column: 2; grid-row: 1; }
    .joystick .j-left  { grid-column: 1; grid-row: 2; }
    .joystick .j-right { grid-column: 3; grid-row: 2; }
    .joystick .j-down  { grid-column: 2; grid-row: 3; }
    /* Custom scrollbar (subtle) */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #b8bdc7; }

    /* Responsive */
    @media (max-width: 900px) {
      .size-block { min-width: 160px; }
    }
    @media (max-width: 700px) {
      .game-area { padding: 10px; gap: 10px; }
      .header-stats .size-label { display: none; }
      .log-panel { width: calc(100vw - 24px); right: 12px; left: 12px; max-width: none; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-stats">
      <div class="size-block">
        <span class="size-label">Размер</span>
        <span class="size-value" id="sizeValue">5.00 / 100</span>
      </div>
      <div class="badges">
        <span class="badge is-warn" id="shieldBadge" hidden><span class="dot"></span>Щит</span>
        <span class="badge is-boost" id="boosterBadge" hidden><span class="dot"></span>Бустер</span>
      </div>
    </div>
    <div class="toolbar">
      <button class="pill" id="autopilotPill" title="Включить/выключить автопилот">
        <span class="pill-dot"></span>Автопилот <span class="kbd">Q</span>
      </button>
      <button class="pill" id="debugPill" title="Показать стрелки целей и угроз — видно, как мыслит ИИ">
        <span class="pill-dot"></span>Логика ИИ <span class="kbd">F</span>
      </button>
      <span class="divider"></span>
      <button class="pill" id="howToPlayBtn" title="Как играть">
        <span class="pill-dot"></span>Как играть?
      </button>
      <button class="icon-btn" id="restartBtn" title="Начать заново" aria-label="Начать заново">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      </button>
      <button class="icon-btn" id="swapSidesBtn" title="Поменять стороны" aria-label="Поменять стороны">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
    </div>
  </header>

  <main class="game-area">
    <div class="canvas-wrap" id="gameBackground">
      <canvas id="gameCanvas"></canvas>
      <button class="overlay-btn intro-btn" id="introStartBtn" hidden>В БОЙ!</button>
      <button class="overlay-btn retry-btn" id="retryBtn" hidden>Попробовать снова</button>
      <div class="joystick" id="joystick" aria-label="Управление">
        <button class="j-up" data-key="ArrowUp" aria-label="Вверх">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 14 12 8 18 14"/></svg>
        </button>
        <button class="j-left" data-key="ArrowLeft" aria-label="Влево">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="14 6 8 12 14 18"/></svg>
        </button>
        <button class="j-right" data-key="ArrowRight" aria-label="Вправо">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="10 6 16 12 10 18"/></svg>
        </button>
        <button class="j-down" data-key="ArrowDown" aria-label="Вниз">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 10 12 16 18 10"/></svg>
        </button>
      </div>
    </div>
    <aside class="log-panel" id="logPanel">
      <div class="log-header">
        <span class="log-title">Лог</span>
      </div>
      <div class="log-body" id="logContent"></div>
    </aside>
  </main>

  <div class="popover" id="rulesPopover" role="dialog" aria-label="">
    <h3> </h3>
    <div class="rules-text">
      <p><strong>Цель:</strong> вырасти до размера 100.</p>
      <p>Растите, ешьте мелких рыб, плодите союзников. Когда враги закончатся — победа.</p>
      <ul id="rulesList"></ul>
    </div>
  </div>

  <div class="popover" id="legendPopover" role="dialog" aria-label="Легенда">
    <h3>Легенда</h3>
    <ul class="legend-list" id="legendList"></ul>
  </div>

  <script>
    // ===== Локализация (ru / en / zh) =====
    const I18N = {
      ru: {
        title: 'Рыба ест рыбу',
        size: 'Размер', shield: 'Щит', readyBreed: 'Готов размножаться', booster: 'Бустер',
        autopilot: 'Автопилот', debug: 'Отладка',
        rules: 'Правила', legend: 'Легенда', log: 'Лог', howToPlay: 'Как играть?', swap: 'Поменять стороны',
        rulesAria: 'Правила', legendAria: 'Легенда',

    // Состояния: 'none', 'wait' (ждём кнопку «В БОЙ!»), 'hold' (автопауза при
    // рестарте), 'zoom' (анимация отдаления).
    let introPhase = 'none';
    let introPhaseStart = 0;
    const INTRO_HOLD_MS = 1000;     // держим приближенный план при рестарте
    const INTRO_ZOOM_MS = 1500;     // время отдаления до нормального масштаба
    let loadingReadyFired = false;  // один раз за загрузку страницы

    let lastTauntTime = 0;          // время последней провокации в логе
    let nextTauntDelay = 9000;      // случайный интервал между провокациями (мс)
    let gameOver = false;
    let gameWon = false;
    let autopilot = false;
    let debugAI = false;
    let pressedKeys = {};
    let targetX = null;
    let targetY = null;
    let flashX = null;
    let flashY = null;
    let flashTimer = 0;
    let lastSpawnTime = 0;
    let lastLevel1SpawnTime = 0;
    let lastShieldSpawnTime = 0;
    let lastTime = performance.now();

    let SCALE = 1;
    function resizeCanvas() {
      const wrap = canvas.parentElement;
      if (!wrap) return;
      const w = Math.max(1, wrap.clientWidth);
      const h = Math.max(1, wrap.clientHeight);
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.round(w * dpr);
      canvas.height = Math.round(h * dpr);
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      SCALE = Math.min(
        canvas.width / ((WORLD_SIZE * 2) + MARGIN * 2),
        canvas.height / ((WORLD_SIZE * 2) + MARGIN * 2)
      );
    }
    window.addEventListener('resize', resizeCanvas);
    // Также реагируем на изменение размеров игровой обёртки (например, когда
    // Яндекс встраивает рекламную панель сбоку — wrap.clientWidth меняется).
    if (typeof ResizeObserver !== 'undefined') {
      try {
        const ro = new ResizeObserver(() => resizeCanvas());
        const wrapEl = document.getElementById('gameBackground');
        if (wrapEl) ro.observe(wrapEl);
      } catch (e) { /* noop */ }
    }
    // Реакция на смену ориентации мобильного устройства.
    window.addEventListener('orientationchange', () => {
      setTimeout(resizeCanvas, 200);
    });

    // ===== Утилиты =====
    const getRadius = size => 5 + (size - 1) * (25 / 99);
    const getDetectionRadius = (size, isPlayer = false) => getRadius(size) * (isPlayer ? 8 : 4);
    // Прирост массы при поедании: чем крупнее хищник, тем меньше прирост.
    // Базовая формула: prey.size × baseFactor × (1 − predator.size / MAX_SIZE)^0.7.
    // Безопасная рыба даёт ×4, больная ×0.5 от обычной.
    function computeGrowth(predator, prey) {
      const base = prey.isSafe ? 0.4 : (prey.isSick ? 0.05 : 0.1);
      const sizeDiminish = Math.pow(Math.max(0, 1 - predator.size / MAX_SIZE), 0.7);
      return prey.size * base * sizeDiminish;
    }
    // Поиск точки, не пересекающейся с существующими большими сущностями
    function findSafeSpawnPos(maxAttempts = 12, requiredClearance = SPAWN_SAFE_PADDING) {
      for (let i = 0; i < maxAttempts; i++) {
        const x = Math.random() * (WORLD_SIZE * 2) - WORLD_SIZE;
        const y = Math.random() * (WORLD_SIZE * 2) - WORLD_SIZE;
        const playerR = getRadius(player.size) + requiredClearance;
        const dxP = x - player.x, dyP = y - player.y;
        if (Math.sqrt(dxP * dxP + dyP * dyP) < playerR) continue;
        let bad = false;
        for (const fish of otherFish) {
          const r = getRadius(fish.size) + requiredClearance;
          const dx = x - fish.x, dy = y - fish.y;
          if (dx * dx + dy * dy < r * r) { bad = true; break; }
        }
        if (!bad) return { x, y };
      }
      // fallback — край карты, чтобы точно ни в кого не залезть
      const sx = (Math.random() < 0.5 ? -1 : 1) * (WORLD_SIZE - 5);
      const sy = (Math.random() < 0.5 ? -1 : 1) * (WORLD_SIZE - 5);
      return { x: sx, y: sy };
    }
    const logMessage = message => {
      const time = new Date().toLocaleTimeString();
      logDiv.innerHTML += `<div>[${time}] ${message}</div>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    };
    // Жирные красные провокации в логе — для атмосферы хардкора.
    const logTaunt = message => {
      const time = new Date().toLocaleTimeString();
      logDiv.innerHTML += `<div class="log-taunt">[${time}] ${message}</div>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    };
    function maybeShowTaunt(timestamp) {
      // Не провоцируем после полной смерти и в ближайшие 4 сек после старта.
      if (player.isDead) return;
      if (timestamp < 4000) return;
      if (timestamp - lastTauntTime < nextTauntDelay) return;
      const list = (I18N[LANG] || I18N.ru).taunts || I18N.ru.taunts;
      if (!list || !list.length) return;
      logTaunt(list[Math.floor(Math.random() * list.length)]);
      lastTauntTime = timestamp;
      // Случайный интервал 8–18 сек, чтобы не приедалось.
      nextTauntDelay = 8000 + Math.floor(Math.random() * 10000);
    }
    // Лёгкая анимация синих брызг (используется при перерождении игрока).
    function spawnSplash(x, y, count = 18, color) {
      const c = color || 'rgba(200,30,30,'; // кровавый по умолчанию
      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2 + Math.random() * 0.5;
        const speed = 30 + Math.random() * 35;
        splashes.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 0,
          maxLife: 0.55 + Math.random() * 0.25,
          color: c
        });
      }
    }
    // Атмосферные пузырьки в воде.
    function initBubbles(count = 36) {
      bubbles = [];
      for (let i = 0; i < count; i++) {
        bubbles.push({
          x: Math.random() * (WORLD_SIZE * 2) - WORLD_SIZE,
          y: Math.random() * (WORLD_SIZE * 2) - WORLD_SIZE,
          r: 0.5 + Math.random() * 1.6,
          vy: -3 - Math.random() * 5,
          drift: (Math.random() - 0.5) * 1.2,
          alpha: 0.18 + Math.random() * 0.25,
          phase: Math.random() * Math.PI * 2
        });
      }
    }
    // Радиус-aware отражение: внешний край рыбы не выходит за границу мира.
    // На углах суммируется отталкивание по обоим осям.
    const reflect = (position, velocity, min, max, radius = 0) => {
      if (position - radius < min) { position = min + radius; velocity = Math.abs(velocity); }
      else if (position + radius > max) { position = max - radius; velocity = -Math.abs(velocity); }
      return { position, velocity };
    };
    const applyVelocity = (fish, dt) => {
      fish.x += fish.vx * dt;
      fish.y += fish.vy * dt;
      const r = getRadius(fish.size);
      let resX = reflect(fish.x, fish.vx, -WORLD_SIZE, WORLD_SIZE, r);
      fish.x = resX.position; fish.vx = resX.velocity;
      let resY = reflect(fish.y, fish.vy, -WORLD_SIZE, WORLD_SIZE, r);
      fish.y = resY.position; fish.vy = resY.velocity;
    };
    // Отталкивание от стен по расстоянию от ВНЕШНЕГО КРАЯ рыбы до стены —
    // чтобы рыба могла подплыть к стенке внешним контуром (edge=0 = касание).
    // Сила нарастает квадратично к стене: вдалеке вообще нет «магнитного»
    // эффекта, у самой стены push становится резко доминирующим — это не
    // даёт хищникам затолкать игрока в угол.
    const wallAvoidance = (x, y, radius) => {
      const buffer = 12; // ширина зоны редиректа от внешнего края рыбы
      let pushX = 0, pushY = 0;
      const eL = (x - (-WORLD_SIZE)) - radius;
      const eR = (WORLD_SIZE - x) - radius;
      const eT = (y - (-WORLD_SIZE)) - radius;
      const eB = (WORLD_SIZE - y) - radius;
      const f = e => {
        if (e >= buffer) return 0;
        // 1 при касании (e=0), мягкий рост от границы зоны.
        const t = Math.max(0, Math.min(1.4, (buffer - e) / buffer));
        return t * t;
      };
      pushX += f(eL) - f(eR);
      pushY += f(eT) - f(eB);
      return { x: pushX, y: pushY };
    };
    const createFish = (x, y, size, vx, vy, isSafe, isSick, isAlpha = false) => ({
      x, y, size, vx, vy, isSafe, isSick, isAlpha,
      spawnTime: performance.now(),
      shieldedUntil: 0,
      isShielded: false,
      trace: [],
      wanderAngle: Math.random() * 2 * Math.PI,
      lastWanderChange: performance.now(),
      lastBreedTime: 0
    });
    const calculateSpeedFactor = (size, isSick) => {
      const baseSpeed = 1 - (size / MAX_SIZE * 0.01);
      return baseSpeed * (isSick ? 0.5 : 1);
    };
    const updateFishTrace = (fish, timestamp) => {
      fish.trace.push({ x: fish.x, y: fish.y, t: timestamp });
      fish.trace = fish.trace.filter(p => timestamp - p.t < TRACE_LENGTH);
    };
    const handleShield = (obj, timestamp) => {
      obj.shieldedUntil = (obj.isShielded && obj.shieldedUntil > timestamp)
        ? obj.shieldedUntil + SHIELD_DURATION : timestamp + SHIELD_DURATION;
      obj.isShielded = true;
    };

    // ===== Автопилот =====
    // Готов ли entity к размножению с другой альфой
    const canBreed = (entity, timestamp) => {
      const ready = entity.size >= ALPHA_BREED_MIN_SIZE
        && (timestamp - (entity.lastBreedTime || 0)) >= ALPHA_BREED_COOLDOWN;
      // К размножению способны альфы и игрок
      return ready && (entity.isAlpha || entity === player);
    };

    const calculateAutopilotVector = (entity, timestamp, others) => {
      let runVectorX = 0, runVectorY = 0;
      let hasTarget = false;
      let primaryThreat = null, primaryPrey = null;
      let closestThreatDist = Infinity, closestPreyDist = Infinity;

      const entityCanBreed = canBreed(entity, timestamp);
      const detectionRadius = getDetectionRadius(entity.size, true);

      for (const other of others) {
        if (!otherFish.includes(other) || other.isShielded || (other === player && player.isDead)) continue;

        const dx = other.x - entity.x;
        const dy = other.y - entity.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        if (distance >= detectionRadius || distance <= 0) continue;

        // Альфа поблизости — особый кейс
        if (other.isAlpha && other !== entity) {
          // Если оба готовы размножаться — летим друг к другу как к "добыче" с двойным весом
          if (entityCanBreed && canBreed(other, timestamp)) {
            hasTarget = true;
            const dirX = dx / distance, dirY = dy / distance;
            runVectorX += (dirX / distance) * 2;
            runVectorY += (dirY / distance) * 2;
            if (distance < closestPreyDist) { closestPreyDist = distance; primaryPrey = other; }
          }
          // Иначе альфы и игрок просто игнорируют друг друга (союзники)
          continue;
        }

        // Обычная логика: больше — угроза, меньше — добыча
        hasTarget = true;
        if (other.size > entity.size) {
          const directionX = -dx / distance;
          const directionY = -dy / distance;
          runVectorX += directionX / distance;
          runVectorY += directionY / distance;
          if (distance < closestThreatDist) { closestThreatDist = distance; primaryThreat = other; }
        } else if (other.size < entity.size && (timestamp - other.spawnTime >= SPAWN_IMMUNITY_MS)) {
          const directionX = dx / distance;
          const directionY = dy / distance;
          runVectorX += directionX / distance;
          runVectorY += directionY / distance;
          if (distance < closestPreyDist) { closestPreyDist = distance; primaryPrey = other; }
        }
      }

      let result;
      const r = getRadius(entity.size);
      const wn = wallAvoidance(entity.x, entity.y, r);
      const wnMag = Math.hypot(wn.x, wn.y);

      // === Smart wall steering (только при наличии угрозы) ===
      // При угрозе и приближении к стенам направляем рыбу по КАСАТЕЛЬНОЙ
      // вдоль стены (вместо упора). В углу две стены — и у обоих тангенсов
      // равная проекция; тогда тай-брейк через wanderAngle, который не
      // обновляется здесь (никакой обратной связи), а медленно дрейфует во
      // время блуждания. Это даёт устойчивое направление выхода из угла.
      const fleeMagSq = runVectorX * runVectorX + runVectorY * runVectorY;
      let tangentApplied = false;
      if (primaryThreat && wnMag > 0.1 && fleeMagSq > 1e-8) {
        const wnNx = wn.x / wnMag;
        const wnNy = wn.y / wnMag;
        const onNormal = runVectorX * wnNx + runVectorY * wnNy;
        if (onNormal < 0) {
          const t1x = -wnNy, t1y = wnNx;
          const t2x = wnNy, t2y = -wnNx;
          const fleeMag = Math.sqrt(fleeMagSq);
          const fnx = runVectorX / fleeMag;
          const fny = runVectorY / fleeMag;
          // Основной критерий — совпадение с направлением бегства.
          let s1 = fnx * t1x + fny * t1y;
          let s2 = fnx * t2x + fny * t2y;
          // Доп. критерий «убегания внутрь карты»: проекция тангенса на
          // вектор от рыбы к центру мира. Помогает однозначно выходить из
          // углов в сторону открытого пространства.
          const cx = -entity.x, cy = -entity.y;
          const cm = Math.hypot(cx, cy) || 1;
          const cxN = cx / cm, cyN = cy / cm;
          s1 += (cxN * t1x + cyN * t1y) * 0.7;
          s2 += (cxN * t2x + cyN * t2y) * 0.7;
          // Слабая стабильность через wanderAngle — детерминистический тай-брейк.
          const cw = Math.cos(entity.wanderAngle);
          const sw = Math.sin(entity.wanderAngle);
          s1 += (cw * t1x + sw * t1y) * 0.15;
          s2 += (cw * t2x + sw * t2y) * 0.15;
          const tx = s1 >= s2 ? t1x : t2x;
          const ty = s1 >= s2 ? t1y : t2y;
          // Усиливаем тангенс — чтобы перемещение вдоль стены было заметным.
          runVectorX = tx * (fleeMag + 0.5);
          runVectorY = ty * (fleeMag + 0.5);
          // Лёгкий wall-push, чтобы не прижиматься к стене.
          runVectorX += wn.x * 1.5;
          runVectorY += wn.y * 1.5;
          tangentApplied = true;
        }
      }

      // НЕТ автоматического wallAvoidance в нетангенциальной ветке —
      // иначе рыба не может коснуться стены своим внешним контуром.
      // При свободном движении (нет угрозы или угроза не толкает в стену)
      // граница обрабатывается жёстким клампом в reflect/applyVelocity.

      const magnitude = Math.hypot(runVectorX, runVectorY);
      if (magnitude > 0.005) {
        result = { x: runVectorX / magnitude, y: runVectorY / magnitude };
      } else {
        // Стабильное блуждание — wanderAngle меняется не чаще 1 раза в сек.
        if (timestamp - entity.lastWanderChange >= 1000) {
          entity.wanderAngle += (Math.random() * 2 - 1) * WANDER_ANGLE_CHANGE;
          entity.lastWanderChange = timestamp;
        }
        let wanderX = Math.cos(entity.wanderAngle);
        let wanderY = Math.sin(entity.wanderAngle);
        // В блуждании отталкиваем от стены ТОЛЬКО если wanderAngle ведёт в
        // стену — иначе рыба может спокойно скользить вдоль края, касаясь
        // его внешним контуром. При входе в стену — мягкий тангенциальный
        // разворот, чтобы рыба не «ткнулась» и не залипла на 1 секунду.
        if (wnMag > 0.1) {
          const wnNx = wn.x / wnMag, wnNy = wn.y / wnMag;
          const wanderOnNormal = wanderX * wnNx + wanderY * wnNy;
          if (wanderOnNormal < 0) {
            // Заменяем нормальную компоненту на тангенциальную сторону «к
            // открытому пространству» (центру), чтобы выйти из угла.
            const t1x = -wnNy, t1y = wnNx;
            const t2x = wnNy, t2y = -wnNx;
            const cx = -entity.x, cy = -entity.y;
            const cm = Math.hypot(cx, cy) || 1;
            const cxN = cx / cm, cyN = cy / cm;
            const s1 = cxN * t1x + cyN * t1y;
            const s2 = cxN * t2x + cyN * t2y;
            const tx = s1 >= s2 ? t1x : t2x;
            const ty = s1 >= s2 ? t1y : t2y;
            wanderX = tx + wn.x * 0.5;
            wanderY = ty + wn.y * 0.5;
            const m = Math.hypot(wanderX, wanderY) || 1;
            wanderX /= m; wanderY /= m;
            // Запоминаем угол скольжения, чтобы wanderAngle не возвращал
            // рыбу обратно в стену через миллисекунды.
            entity.wanderAngle = Math.atan2(wanderY, wanderX);
          }
        }
        result = { x: wanderX, y: wanderY };
      }

      return { vector: result, threat: primaryThreat, prey: primaryPrey };
    };

    // ===== Спавн =====
    const generateInitialFish = (count = 45) => {
      for (let i = 0; i < count; i++) {
        const { x, y } = findSafeSpawnPos(8, 6);
        const size = MIN_SIZE + Math.random() * (START_MAX_SIZE - MIN_SIZE);
        const isSafe = Math.random() < SAFE_FISH_CHANCE;
        const isSick = isSafe ? false : (Math.random() < SICK_FISH_CHANCE);
        const speedFactor = calculateSpeedFactor(size, isSick);
        const angle = Math.random() * 2 * Math.PI;
        const vx = GLOBAL_SPEED * speedFactor * Math.cos(angle);
        const vy = GLOBAL_SPEED * speedFactor * Math.sin(angle);
        otherFish.push(createFish(x, y, size, vx, vy, isSafe, isSick));
      }
      if (ALPHA_FISH) otherFish.push(createFish(10, 10, 5, 0, 0, false, false, true));
    };
    const addNewFish = (count = 1) => {
      for (let i = 0; i < count; i++) {
        const { x, y } = findSafeSpawnPos();
        const sizeVariation = (Math.random() * 20 - 10);
        let size = Math.max(MIN_SIZE, Math.min(MAX_SIZE, player.size + sizeVariation));
        const isSafe = Math.random() < SAFE_FISH_CHANCE;
        const isSick = isSafe ? false : (Math.random() < SICK_FISH_CHANCE);
        const speedFactor = calculateSpeedFactor(size, isSick);
        const angle = Math.random() * 2 * Math.PI;
        const vx = GLOBAL_SPEED * speedFactor * Math.cos(angle);
        const vy = GLOBAL_SPEED * speedFactor * Math.sin(angle);
        otherFish.push(createFish(x, y, size, vx, vy, isSafe, isSick));
      }
    };
    const spawnLevel1Fish = () => {
      const { x, y } = findSafeSpawnPos();
      const isSafe = Math.random() < SAFE_FISH_CHANCE;
      const isSick = false;
      const speedFactor = calculateSpeedFactor(MIN_SIZE, isSick);
      const angle = Math.random() * 2 * Math.PI;
      const vx = GLOBAL_SPEED * speedFactor * Math.cos(angle);
      const vy = GLOBAL_SPEED * speedFactor * Math.sin(angle);
      otherFish.push(createFish(x, y, MIN_SIZE, vx, vy, isSafe, isSick));
    };
    const spawnShield = () => {
      const { x, y } = findSafeSpawnPos();
      shields.push({ x, y, spawnTime: performance.now() });
      logMessage(t('log_shieldSpawn'));
    };
    const spawnSpeedBooster = () => {
      const { x, y } = findSafeSpawnPos();
      speedBoosters.push({ x, y, spawnTime: performance.now() });
      logMessage(t('log_boosterSpawn'));
    };
    const spawnPill = () => {
      const { x, y } = findSafeSpawnPos();
      pills.push({ x, y, spawnTime: performance.now() });
      logMessage(t('log_pillSpawn'));
    };

    // ===== Легенда / правила =====
    // SVG-щит для легенды (геральдическая форма).
    const SHIELD_SVG =
      '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
        '<path d="M 4 5 Q 12 2 20 5 L 20 12 Q 20 19 12 22 Q 4 19 4 12 Z" ' +
              'fill="rgb(255,204,0)" stroke="rgb(180,120,0)" stroke-width="1.4" stroke-linejoin="round"/>' +
      '</svg>';
    // SVG-таблетка (капсула) для легенды.
    const PILL_SVG =
      '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
        '<defs><clipPath id="pillClip"><rect x="3" y="9" width="18" height="6" rx="3" ry="3"/></clipPath></defs>' +
        '<rect x="3" y="9" width="18" height="6" rx="3" ry="3" fill="white" stroke="rgb(180,40,40)" stroke-width="1.2"/>' +
        '<rect x="3" y="9" width="9" height="6" fill="rgb(225,60,60)" clip-path="url(#pillClip)"/>' +
      '</svg>';
    // SVG-молния для пункта «Бустер скорости» (Material Icons-style path).
    const BOLT_SVG =
      '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
        '<path d="M 7 21 L 17 12 L 12 12 L 16 3 L 8 12 L 13 12 Z" ' +
              'fill="rgb(95,189,255)" stroke="rgb(10,120,216)" stroke-width="1.6" stroke-linejoin="round"/>' +
      '</svg>';

    function buildLegend() {
      const ll = document.getElementById('legendList');
      if (!ll) return;
      const items = [
        { swatch: 'background:hsla(285,75%,55%,0.95);border-color:#7a3eb0', text: t('leg_player'), desc: t('leg_player_desc') },

    // ===== Коллизии =====
    const handleFishCollisions = (fish1, fish2, timestamp) => {
      const t1 = timestamp - fish1.spawnTime, t2 = timestamp - fish2.spawnTime;
      if (t1 < SPAWN_IMMUNITY_MS || t2 < SPAWN_IMMUNITY_MS) return null;
      const dx = fish1.x - fish2.x, dy = fish1.y - fish2.y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      if (distance < getRadius(fish1.size) + getRadius(fish2.size)) {
        if (fish1.isAlpha && fish2.isAlpha && !fish1.isShielded && !fish2.isShielded) {
          if (fish1.size >= ALPHA_BREED_MIN_SIZE && fish2.size >= ALPHA_BREED_MIN_SIZE &&
              timestamp - fish1.lastBreedTime >= ALPHA_BREED_COOLDOWN && timestamp - fish2.lastBreedTime >= ALPHA_BREED_COOLDOWN) {
            fish1.size -= 2; fish2.size -= 2;
            fish1.lastBreedTime = timestamp; fish2.lastBreedTime = timestamp;
            otherFish.push(createFish(fish1.x, fish1.y, 2, 0, 0, false, false, true));
            logMessage(t('log_alphaAlpha'));
          }
          return null;
        }
        if (fish1.size > fish2.size && !fish2.isShielded && !fish1.isSafe && !fish2.isAlpha) {
          fish1.size = Math.min(MAX_SIZE, fish1.size + computeGrowth(fish1, fish2));
          eatEffects.push({ x: fish2.x, y: fish2.y, size: fish2.size, timer: FLASH_DURATION });
          return fish2;
        } else if (fish2.size > fish1.size && !fish1.isShielded && !fish2.isSafe && !fish1.isAlpha) {
          fish2.size = Math.min(MAX_SIZE, fish2.size + computeGrowth(fish2, fish1));
          eatEffects.push({ x: fish1.x, y: fish1.y, size: fish1.size, timer: FLASH_DURATION });
          return fish1;
        }
      }
      return null;
    };
    const handlePlayerCollisions = (fish, timestamp) => {
      const timeSinceSpawn = timestamp - fish.spawnTime;
      if (timeSinceSpawn < SPAWN_IMMUNITY_MS || player.isDead) return;
      const dx = fish.x - player.x, dy = fish.y - player.y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      if (distance < getRadius(player.size) + getRadius(fish.size)) {
        if (fish.isAlpha && !player.isShielded && !fish.isShielded) {
          if (player.size >= ALPHA_BREED_MIN_SIZE && fish.size >= ALPHA_BREED_MIN_SIZE &&
              timestamp - player.lastBreedTime >= ALPHA_BREED_COOLDOWN && timestamp - fish.lastBreedTime >= ALPHA_BREED_COOLDOWN) {
            player.size -= 2; fish.size -= 2;
            player.lastBreedTime = timestamp; fish.lastBreedTime = timestamp;
            otherFish.push(createFish(player.x, player.y, 2, 0, 0, false, false, true));
            logMessage(t('log_alphaCollide'));
          }
          return false;
        }
        if (player.size > fish.size && !fish.isShielded && !fish.isAlpha) {
          const sizeIncrease = computeGrowth(player, fish);
          const kind = fish.isSafe ? t('log_kindSafe') : (fish.isSick ? t('log_kindSick') : t('log_kindNormal'));
          logMessage(t('log_eaten')(kind, fish.size.toFixed(2), sizeIncrease.toFixed(2)));
          player.size = Math.min(MAX_SIZE, player.size + sizeIncrease);
          flashX = player.x; flashY = player.y;
          flashTimer = FLASH_DURATION;
          eatEffects.push({ x: fish.x, y: fish.y, size: fish.size, timer: FLASH_DURATION });
          spawnSplash(fish.x, fish.y, 6);
          addNewFish(1);
          return true;
        } else if (fish.size > player.size && !player.isShielded && !fish.isSafe && !fish.isAlpha) {
          player.isDead = true;
          eatEffects.push({ x: player.x, y: player.y, size: player.size * 2, timer: FLASH_DURATION * 2 });
          // Если есть живые союзники — переселяемся. Иначе game over.
          if (tryReincarnateAsAlly()) {
            // успешное перерождение — gameOver не выставляется
          } else {
            gameOver = true;
            const wrap = document.getElementById('gameBackground');
            wrap.style.backgroundColor = 'rgba(255, 192, 192, 0.5)';
            wrap.classList.add('is-dead');
          }
        }
      }
      return false;
    };
    const handleAlphaCollisions = (fish, timestamp) => {
      const timeSinceSpawn = timestamp - fish.spawnTime;
      if (timeSinceSpawn < SPAWN_IMMUNITY_MS) return;
      for (let i = 0; i < otherFish.length; i++) {
        const alpha = otherFish[i];
        if (!alpha.isAlpha || alpha === fish) continue;
        const dx = fish.x - alpha.x, dy = fish.y - alpha.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        if (distance < getRadius(alpha.size) + getRadius(fish.size)) {
          if (alpha.size > fish.size && !fish.isShielded && !fish.isAlpha) {
            alpha.size = Math.min(MAX_SIZE, alpha.size + computeGrowth(alpha, fish));
            eatEffects.push({ x: fish.x, y: fish.y, size: fish.size, timer: FLASH_DURATION });
            addNewFish(1);
            return true;
          }
        }
      }
      return false;
    };
    const handleShieldCollisions = timestamp => {
      for (let i = shields.length - 1; i >= 0; i--) {
        const shield = shields[i];
        const dxPlayer = player.x - shield.x, dyPlayer = player.y - shield.y;
        const distancePlayer = Math.sqrt(dxPlayer * dxPlayer + dyPlayer * dyPlayer);
        if (distancePlayer < getRadius(player.size) + 5 && !player.isDead) {
          handleShield(player, timestamp);
          logMessage(t('log_shieldPick'));
          shields.splice(i, 1);
          continue;
        }
        for (let j = 0; j < otherFish.length; j++) {
          const fish = otherFish[j];
          const dxFish = fish.x - shield.x, dyFish = fish.y - shield.y;
          const distanceFish = Math.sqrt(dxFish * dxFish + dyFish * dyFish);
          if (distanceFish < getRadius(fish.size) + 5) {
            handleShield(fish, timestamp);
            shields.splice(i, 1);
            break;
          }
        }
      }
    };

    // Только игрок может подобрать таблетку.
    const handlePillCollisions = timestamp => {
      if (player.isDead) return;
      for (let i = pills.length - 1; i >= 0; i--) {
        const p = pills[i];
        const dx = player.x - p.x, dy = player.y - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < getRadius(player.size) + 5) {
          if (player.isSick) {
            player.isSick = false;
            logMessage(t('log_pillCure'));
          } else {
            player.pillImmunityUntil = (player.pillImmunityUntil > timestamp ? player.pillImmunityUntil : timestamp) + PILL_IMMUNITY_DURATION;
            logMessage(t('log_pillImmunity'));
          }
          pills.splice(i, 1);
        }
      }
    };

    // Только игрок может подобрать бустер скорости.
    const handleSpeedBoosterCollisions = timestamp => {
      if (player.isDead) return;
      for (let i = speedBoosters.length - 1; i >= 0; i--) {
        const b = speedBoosters[i];
        const dx = player.x - b.x, dy = player.y - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < getRadius(player.size) + 5) {
          // Если уже есть бустер — продлеваем
          player.speedBoostUntil = (player.speedBoostUntil > timestamp ? player.speedBoostUntil : timestamp) + SPEED_BOOSTER_DURATION;
          speedBoosters.splice(i, 1);
          logMessage(t('log_boosterPick'));
        }
      }
    };

    // ===== Управление автопилотом / отладкой =====
    function setAutopilot(value) {
      autopilot = value;
      autopilotPill.classList.toggle('is-active', value);
