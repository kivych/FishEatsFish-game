    }
    function setDebug(value) {
      debugAI = value;
      debugPill.classList.toggle('is-active', value);
      debugPill.classList.toggle('warn', value);
      document.body.classList.toggle('is-debug-on', value);
      logMessage(value ? t('log_dbgOn') : t('log_dbgOff'));
    }

    // ===== Перерождение в союзника после смерти =====
    // После смерти игрок автоматически вселяется в самого крупного живого
    // союзника. Если несколько одного размера — берём самого старого (первого
    // рождённого). Управление переходит на автопилоте, пользователь может его
    // отключить вручную (Q). Доступных перерождений = число живых союзников.
    function tryReincarnateAsAlly() {
      if (!ALPHA_FISH) return false;
      const allies = otherFish.filter(f => f.isAlpha);
      if (allies.length === 0) return false;
      allies.sort((a, b) => (b.size - a.size) || (a.spawnTime - b.spawnTime));
      const chosen = allies[0];

      // Анимация: лёгкие синие брызги в точке перехода.
      spawnSplash(chosen.x, chosen.y);

      // Переносим всё нужное состояние из союзника в игрока.
      player.x = chosen.x;
      player.y = chosen.y;
      player.size = chosen.size;
      player.spawnTime = chosen.spawnTime;
      player.shieldedUntil = chosen.shieldedUntil || 0;
      player.isShielded = !!chosen.isShielded;
      player.lastBreedTime = chosen.lastBreedTime || 0;
      player.speedBoostUntil = 0;
      player.isSick = !!chosen.isSick;
      player.pillImmunityUntil = chosen.pillImmunityUntil || 0;
      player.isDead = false;
      player.vx = 0; player.vy = 0;

      // Убираем союзника из массива — он стал игроком.
      const idx = otherFish.indexOf(chosen);
      if (idx !== -1) otherFish.splice(idx, 1);

      // Сбрасываем «красную» подсветку поля и состояние gameOver.
      gameOver = false;
      const wrap = document.getElementById('gameBackground');
      wrap.style.backgroundColor = '';
      wrap.classList.remove('is-dead');

      // Пользователь явно просил включать автопилот сразу.
      setAutopilot(true);

      // Подсчитываем оставшихся союзников после переселения и сообщаем.
      const remaining = otherFish.filter(f => f.isAlpha).length;
      logMessage(t('log_reincarnate')(remaining));
      if (remaining === 0) logTaunt(t('log_lastChance'));
      return true;
    }

    // ===== Ввод =====
    // Маппинг WASD → стрелки 
    // или клик; альтернативный ключ R — но обычно достаточно стрелки и клика).
    const PREVENT_KEYS = new Set(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','Space']);
    window.addEventListener('keydown', (e) => {
      if (e.code === 'KeyW') pressedKeys['ArrowUp'] = true;
      else if (e.code === 'KeyS') pressedKeys['ArrowDown'] = true;
      else if (e.code === 'KeyA') pressedKeys['ArrowLeft'] = true;
      else if (e.code === 'KeyD') pressedKeys['ArrowRight'] = true;
      else pressedKeys[e.key] = true;
      if (e.code === 'KeyQ') setAutopilot(!autopilot);
      if (e.code === 'KeyF') setDebug(!debugAI);
      if (e.code === 'Escape') closeAllPopovers();
      if (PREVENT_KEYS.has(e.code)) e.preventDefault();
    });
    window.addEventListener('keyup', (e) => {
      if (e.code === 'KeyW') pressedKeys['ArrowUp'] = false;
      else if (e.code === 'KeyS') pressedKeys['ArrowDown'] = false;
      else if (e.code === 'KeyA') pressedKeys['ArrowLeft'] = false;
	  else if (e.code === 'KeyD') pressedKeys['ArrowRight'] = false;
      else pressedKeys[e.key] = false;
    });
    function pickTargetFromPointer(clientX, clientY) {
      if (autopilot || player.isDead) return;
      const rect = canvas.getBoundingClientRect();
      const screenX = (clientX - rect.left) * (canvas.width / rect.width);
      const screenY = (clientY - rect.top) * (canvas.height / rect.height);
      const tx = (screenX - canvas.width / 2) / SCALE;
      const ty = (screenY - canvas.height / 2) / SCALE;
      // Принимаем только нажатия ВНУТРИ аквариума. Клик в полях между
      // границей мира и краем канваса не должен заставлять рыбу плыть в стену.
      if (Math.abs(tx) > WORLD_SIZE || Math.abs(ty) > WORLD_SIZE) return;
      targetX = tx;
      targetY = ty;
    }
    canvas.addEventListener('click', (e) => pickTargetFromPointer(e.clientX, e.clientY));
    // Запрет системного контекстного меню по всему документу
    // (требование Яндекс.Игр п. 1.6.2.7 — никакого выделения и контекстных меню).
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    // Запрет выделения текста через drag на mousedown (на всякий случай).
    document.addEventListener('selectstart', (e) => {
      // Разрешаем выделение только в текстовых полях (если будут).
      const tag = e.target && e.target.tagName;
      if (tag !== 'INPUT' && tag !== 'TEXTAREA') e.preventDefault();
    });
    // Запрет drag-start на изображениях/прочих элементах.
    document.addEventListener('dragstart', (e) => e.preventDefault());
    canvas.addEventListener('touchstart', (e) => {
      if (e.touches && e.touches.length) {
        pickTargetFromPointer(e.touches[0].clientX, e.touches[0].clientY);
        e.preventDefault();
      }
    }, { passive: false });
    canvas.addEventListener('touchmove', (e) => {
      if (e.touches && e.touches.length) {
        pickTargetFromPointer(e.touches[0].clientX, e.touches[0].clientY);
        e.preventDefault();
      }
    }, { passive: false });


    // ===== Виртуальный джойстик =====
    // Десктоп — отдельные кнопки + клавиатура. Тач — аналоговый стик:
    // палец на джойстике, направление = вектор от центра джойстика к пальцу,
    // палец можно водить между стрелками без отпускания.
    const joystickEl = document.getElementById('joystick');
    let joystickTouchId = null;
    let joystickVec = null;

    function joystickClass(dx, dy) {
      if (Math.abs(dy) > Math.abs(dx)) return dy < 0 ? '.j-up' : '.j-down';
      return dx < 0 ? '.j-left' : '.j-right';
    }
    function updateJoystickVec(clientX, clientY) {
      const r = joystickEl.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const dx = clientX - cx;
      const dy = clientY - cy;
      const mag = Math.hypot(dx, dy);
      joystickEl.querySelectorAll('button').forEach(b => b.classList.remove('is-pressed'));
      if (mag < 8) { joystickVec = null; return; }
      joystickVec = { x: dx / mag, y: dy / mag };
      const sel = joystickClass(dx, dy);
      const btn = joystickEl.querySelector(sel);
      if (btn) btn.classList.add('is-pressed');
    }
    joystickEl.addEventListener('touchstart', (e) => {
      if (joystickTouchId !== null) return;
      const t = e.changedTouches[0];
      joystickTouchId = t.identifier;
      // При активации джойстика — сбрасываем target от тапа в канвас.
      targetX = null; targetY = null;
      updateJoystickVec(t.clientX, t.clientY);
      e.preventDefault();
    }, { passive: false });
    document.addEventListener('touchmove', (e) => {
      if (joystickTouchId === null) return;
      for (const t of e.changedTouches) {
        if (t.identifier === joystickTouchId) {
          updateJoystickVec(t.clientX, t.clientY);
          e.preventDefault();
        }
      }
    }, { passive: false });
    const endJoystick = (e) => {
      if (joystickTouchId === null) return;
      for (const t of e.changedTouches) {
        if (t.identifier === joystickTouchId) {
          joystickTouchId = null;
          joystickVec = null;
          joystickEl.querySelectorAll('button').forEach(b => b.classList.remove('is-pressed'));
        }
      }
    };
    document.addEventListener('touchend', endJoystick);
    document.addEventListener('touchcancel', endJoystick);
    // Десктоп: мышка по отдельным кнопкам — обычные стрелки.
    joystickEl.querySelectorAll('button').forEach(btn => {
      const key = btn.dataset.key;
      const press = (e) => { pressedKeys[key] = true; btn.classList.add('is-pressed'); e.preventDefault(); };
      const release = () => { pressedKeys[key] = false; btn.classList.remove('is-pressed'); };
      btn.addEventListener('mousedown', press);
      btn.addEventListener('mouseup', release);
      btn.addEventListener('mouseleave', release);
    });

    // ===== Рестарт без перезагрузки страницы (важно для Yandex Games iframe) =====
    function restartGame() {
      otherFish = []; shields = []; speedBoosters = []; pills = []; eatEffects = [];
      splashes = [];
      introStart = performance.now();
      gameOver = false; gameWon = false;
      pressedKeys = {}; targetX = null; targetY = null;
      flashX = null; flashY = null; flashTimer = 0;
      lastSpawnTime = 0; lastLevel1SpawnTime = 0; lastShieldSpawnTime = 0;
      lastSpeedBoosterSpawn = 0; lastPillSpawn = 0;
      lastTauntTime = 0; nextTauntDelay = 9000;
      lastTime = performance.now();
      player = { x: 0, y: 0, size: 5, spawnTime: 0, shieldedUntil: 0, isShielded: false, vx: 0, vy: 0, wanderAngle: 0, lastWanderChange: 0, lastBreedTime: 0, isDead: false, speedBoostUntil: 0, isSick: false, pillImmunityUntil: 0 };
      const wrap = document.getElementById('gameBackground');
      wrap.style.backgroundColor = '';
      wrap.classList.remove('is-dead');
      logDiv.innerHTML = '';
      initBubbles();
      generateInitialFish();
      // Рестарт — короткая авто-интро (hold + zoom), без кнопки «В БОЙ!».
      introPhase = 'hold';
      introPhaseStart = performance.now();
      lastTime = introPhaseStart;
      if (introStartBtn) introStartBtn.hidden = true;
      if (retryBtn) retryBtn.hidden = true;
      requestAnimationFrame(animate);
    }

    // ===== UI обработчики =====
    function closeAllPopovers() {
      rulesPopover.classList.remove('is-open');
      legendPopover.classList.remove('is-open');
    }
    function togglePopover(pop) {
      const willOpen = !pop.classList.contains('is-open');
      closeAllPopovers();
      if (willOpen) pop.classList.add('is-open');
    }
    howToPlayBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const open = !rulesPopover.classList.contains('is-open');
      closeAllPopovers();
      if (open) {
        rulesPopover.classList.add('is-open');
        legendPopover.classList.add('is-open');
      }
    });
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.popover') && !e.target.closest('#howToPlayBtn')) {
        closeAllPopovers();
      }
    });

    autopilotPill.addEventListener('click', () => setAutopilot(!autopilot));
    debugPill.addEventListener('click', () => setDebug(!debugAI));
    restartBtn.addEventListener('click', () => restartGame());
    introStartBtn.addEventListener('click', () => {
      if (introPhase !== 'wait') return;
      introPhase = 'zoom';
      introPhaseStart = performance.now();
      introStartBtn.hidden = true;
    });
    retryBtn.addEventListener('click', () => {
      retryBtn.hidden = true;
      setAutopilot(false);
      restartGame();
    });
    swapSidesBtn.addEventListener('click', () => {
      document.body.classList.toggle('is-layout-swapped');
      try { localStorage.setItem('layoutSwapped', document.body.classList.contains('is-layout-swapped') ? '1' : '0'); } catch (e) {}
    });

    // ===== Логика игры =====
    function update(dt, timestamp) {
      // Во время стартовой интро-анимации ничего не двигается —
      // только пузырьки в фоне для атмосферы.
      if (introPhase !== 'none') {
        bubbles.forEach(b => {
          b.phase += dt * 1.6;
          b.x += Math.cos(b.phase) * b.drift * dt;
          b.y += b.vy * dt;
          if (b.y < -WORLD_SIZE - 4) {
            b.y = WORLD_SIZE + 4;
            b.x = Math.random() * (WORLD_SIZE * 2) - WORLD_SIZE;
          }
        });
        return;
      }
      // Спавн врагов идёт всегда — после смерти игрока союзники продолжают
      // играть бесконечно, пока хоть один из них жив.
      if (timestamp - lastLevel1SpawnTime >= LEVEL1_FISH_SPAWN_INTERVAL) {
        spawnLevel1Fish();
        lastLevel1SpawnTime = timestamp;
      }
      if (timestamp - lastShieldSpawnTime >= SHIELD_SPAWN_INTERVAL) {
        if (Math.random() < SHIELD_SPAWN_CHANCE) spawnShield();
        lastShieldSpawnTime = timestamp;
      }
      shields = shields.filter(shield => timestamp - shield.spawnTime < SHIELD_DURATION);

      // Атмосферные пузырьки — поднимаются вверх, перерождаются снизу.
      bubbles.forEach(b => {
        b.phase += dt * 1.6;
        b.x += Math.cos(b.phase) * b.drift * dt;
        b.y += b.vy * dt;
        if (b.y < -WORLD_SIZE - 4) {
          b.y = WORLD_SIZE + 4;
          b.x = Math.random() * (WORLD_SIZE * 2) - WORLD_SIZE;
        }
      });
      // Брызги от перерождения
      splashes.forEach(s => {
        s.life += dt;
        s.x += s.vx * dt;
        s.y += s.vy * dt;
        s.vx *= 0.92;
        s.vy *= 0.92;
      });
      splashes = splashes.filter(s => s.life < s.maxLife);

      // Провокационные сообщения в логе — поддерживают давление.
      maybeShowTaunt(timestamp);

      // Спавн бустера скорости
      if (timestamp - lastSpeedBoosterSpawn >= SPEED_BOOSTER_SPAWN_INTERVAL) {
        if (Math.random() < SPEED_BOOSTER_SPAWN_CHANCE) spawnSpeedBooster();
        lastSpeedBoosterSpawn = timestamp;
      }
      speedBoosters = speedBoosters.filter(b => timestamp - b.spawnTime < SPEED_BOOSTER_VISIBLE_DURATION);
      // Спавн таблетки
      if (timestamp - lastPillSpawn >= PILL_SPAWN_INTERVAL) {
        if (Math.random() < PILL_SPAWN_CHANCE) spawnPill();
        lastPillSpawn = timestamp;
      }
      pills = pills.filter(p => timestamp - p.spawnTime < PILL_VISIBLE_DURATION);

      // Игрок может заболеть случайно (если не safe — но safe для рыб; для игрока — только иммунитет).
      if (!player.isDead && !player.isSick && (player.pillImmunityUntil || 0) < timestamp
          && Math.random() < SICK_FISH_CHANCE * dt * 60) {
        player.isSick = true;
        logMessage(t('log_playerSick'));
      }

      let dirX = 0, dirY = 0;
      if (!player.isDead) {
        if (!autopilot) {
          if (pressedKeys['ArrowRight']) dirX += 1;
          if (pressedKeys['ArrowLeft']) dirX -= 1;
          if (pressedKeys['ArrowUp']) dirY -= 1;
          if (pressedKeys['ArrowDown']) dirY += 1;
          // Аналог-джойстик переопределяет клавиатуру.
          if (joystickVec) { dirX = joystickVec.x; dirY = joystickVec.y; }
          // Тап в канвас — самый высокий приоритет (плывём к пальцу).
          if (targetX !== null && targetY !== null) {
            const dx = targetX - player.x, dy = targetY - player.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            if (distance > 5) { dirX = dx / distance; dirY = dy / distance; }
            else { targetX = null; targetY = null; }
          }
        } else {
          const runData = calculateAutopilotVector(player, timestamp, otherFish);
          dirX = runData.vector.x; dirY = runData.vector.y;
        }

        if (dirX !== 0 || dirY !== 0) {
          const magnitude = Math.sqrt(dirX * dirX + dirY * dirY);
          const boostMul = (player.speedBoostUntil > timestamp) ? (1 + SPEED_BOOSTER_BONUS) : 1;
          const sickMul = player.isSick ? 0.5 : 1;
          player.x += PLAYER_SPEED * boostMul * sickMul * (dirX / magnitude) * dt;
          player.y += PLAYER_SPEED * boostMul * sickMul * (dirY / magnitude) * dt;
        }
        const pr = getRadius(player.size);
        let resPX = reflect(player.x, 0, -WORLD_SIZE, WORLD_SIZE, pr); player.x = resPX.position;
        let resPY = reflect(player.y, 0, -WORLD_SIZE, WORLD_SIZE, pr); player.y = resPY.position;
      }

      otherFish.forEach(fish => {
        const timeSinceSpawn = timestamp - fish.spawnTime;
        if (timeSinceSpawn < SPAWN_IMMUNITY_MS) return;
        updateFishTrace(fish, timestamp);
        if (!fish.isSafe && !fish.isSick && (fish.pillImmunityUntil || 0) < timestamp && Math.random() < SICK_FISH_CHANCE * dt * 60) {
          fish.isSick = true; fish.vx *= 0.5; fish.vy *= 0.5;
        }

        if (fish.isAlpha) {
          const alphaRunData = calculateAutopilotVector(fish, timestamp, otherFish);
          // Альфа тоже замедляется при болезни (×0.5).
          const aFactor = calculateSpeedFactor(fish.size, fish.isSick);
          fish.vx = PLAYER_SPEED * aFactor * alphaRunData.vector.x;
          fish.vy = PLAYER_SPEED * aFactor * alphaRunData.vector.y;
        } else {
          const considerPrey = !fish.isSafe;
          const others = otherFish.concat(player.isDead ? [] : [player]).filter(other => other !== fish && !other.isAlpha);
          let runVectorX = 0, runVectorY = 0;
          let primaryThreat = null, primaryPrey = null;
          let closestThreatDist = Infinity, closestPreyDist = Infinity;
          const detectionRadius = getDetectionRadius(fish.size);
          for (const other of others) {
            if (other.isShielded) continue;
            const dx = other.x - fish.x, dy = other.y - fish.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < detectionRadius && distance > 0) {
              if (other.size > fish.size) {
                runVectorX += -dx / distance / distance;
                runVectorY += -dy / distance / distance;
                if (distance < closestThreatDist) { closestThreatDist = distance; primaryThreat = other; }
              } else if (considerPrey && other.size < fish.size && (timestamp - other.spawnTime >= SPAWN_IMMUNITY_MS)) {
                runVectorX += dx / distance / distance;
                runVectorY += dy / distance / distance;
                if (distance < closestPreyDist) { closestPreyDist = distance; primaryPrey = other; }
              }
            }
          }
          const fr = getRadius(fish.size);
          const wn = wallAvoidance(fish.x, fish.y, fr);
          const wnMag = Math.hypot(wn.x, wn.y);

          // Smart wall steering для non-alpha — только в режиме бегства.
          // При охоте без угрозы стена ослаблена, чтобы хищник доходил до
          // добычи, прижатой к границе.
          let nonAlphaTangent = false;
          const fleeMagSq = runVectorX * runVectorX + runVectorY * runVectorY;
          if (primaryThreat && wnMag > 0.1 && fleeMagSq > 1e-8) {
            const wnNx = wn.x / wnMag, wnNy = wn.y / wnMag;
            const onNormal = runVectorX * wnNx + runVectorY * wnNy;
            if (onNormal < 0) {
              const t1x = -wnNy, t1y = wnNx;
              const t2x = wnNy, t2y = -wnNx;
              const fleeMag = Math.sqrt(fleeMagSq);
              const fnx = runVectorX / fleeMag, fny = runVectorY / fleeMag;
              let s1 = fnx * t1x + fny * t1y;
              let s2 = fnx * t2x + fny * t2y;
              // Бонус за выход в открытое пространство (к центру).
              const cxN = -fish.x, cyN = -fish.y;
              const cm = Math.hypot(cxN, cyN) || 1;
              s1 += (cxN / cm * t1x + cyN / cm * t1y) * 0.7;
              s2 += (cxN / cm * t2x + cyN / cm * t2y) * 0.7;
              // wanderAngle — слабый тай-брейк.
              const cw = Math.cos(fish.wanderAngle), sw = Math.sin(fish.wanderAngle);
              s1 += (cw * t1x + sw * t1y) * 0.15;
              s2 += (cw * t2x + sw * t2y) * 0.15;
              const tx = s1 >= s2 ? t1x : t2x;
              const ty = s1 >= s2 ? t1y : t2y;
              runVectorX = tx * (fleeMag + 0.5) + wn.x * 1.5;
              runVectorY = ty * (fleeMag + 0.5) + wn.y * 1.5;
              nonAlphaTangent = true;
            }
          }

          // НЕТ автоматического wallAvoidance в нетангенциальной ветке —
          // иначе рыба не подплывает к стене внешним контуром. Граница
          // обрабатывается жёстким клампом в applyVelocity.

          const magnitude = Math.sqrt(runVectorX * runVectorX + runVectorY * runVectorY);
          let dirX, dirY;
          if (magnitude > 0.01) {
            dirX = runVectorX / magnitude;
            dirY = runVectorY / magnitude;
          } else {
            if (timestamp - fish.lastWanderChange >= 1000) {
              fish.wanderAngle += (Math.random() * 2 - 1) * WANDER_ANGLE_CHANGE;
              fish.lastWanderChange = timestamp;
            }
            dirX = Math.cos(fish.wanderAngle);
            dirY = Math.sin(fish.wanderAngle);
            // Тангенциальное скольжение в режиме блуждания — только если
            // wanderAngle направлен В стену.
            if (wnMag > 0.1) {
              const wnNx = wn.x / wnMag, wnNy = wn.y / wnMag;
              const wOnNormal = dirX * wnNx + dirY * wnNy;
              if (wOnNormal < 0) {
                const t1x = -wnNy, t1y = wnNx;
                const t2x = wnNy, t2y = -wnNx;
                const cxN = -fish.x, cyN = -fish.y;
                const cm = Math.hypot(cxN, cyN) || 1;
                const s1 = cxN / cm * t1x + cyN / cm * t1y;
                const s2 = cxN / cm * t2x + cyN / cm * t2y;
                const tx = s1 >= s2 ? t1x : t2x;
                const ty = s1 >= s2 ? t1y : t2y;
                dirX = tx + wn.x * 0.5;
                dirY = ty + wn.y * 0.5;
                const m2 = Math.sqrt(dirX * dirX + dirY * dirY) || 1;
                dirX /= m2; dirY /= m2;
                fish.wanderAngle = Math.atan2(dirY, dirX);
              }
            }
          }

          const speed = GLOBAL_SPEED * calculateSpeedFactor(fish.size, fish.isSick);
          fish.vx = speed * dirX;
          fish.vy = speed * dirY;
        }

        applyVelocity(fish, dt);
        if (fish.shieldedUntil && timestamp > fish.shieldedUntil) {
          fish.shieldedUntil = 0; fish.isShielded = false;
        }
      });

      for (let i = otherFish.length - 1; i >= 0; i--) {
        for (let j = i - 1; j >= 0; j--) {
          if (j >= otherFish.length) continue;
          const removedFish = handleFishCollisions(otherFish[i], otherFish[j], timestamp);
          if (removedFish) {
            const idx = otherFish.indexOf(removedFish);
            if (idx !== -1) otherFish.splice(idx, 1);
            if (removedFish === otherFish[i]) { i--; break; }
          }
        }
        if (i < 0 || i >= otherFish.length) continue;
        if (handlePlayerCollisions(otherFish[i], timestamp)) {
          otherFish.splice(i, 1);
        } else if (handleAlphaCollisions(otherFish[i], timestamp)) {
          otherFish.splice(i, 1);
        }
      }
      handleShieldCollisions(timestamp);
      handleSpeedBoosterCollisions(timestamp);
      handlePillCollisions(timestamp);

      if (player.isShielded && timestamp > player.shieldedUntil) {
        player.isShielded = false; player.shieldedUntil = 0;
        logMessage(t('log_shieldEnd'));
      }
      if (player.speedBoostUntil && timestamp > player.speedBoostUntil) {
        player.speedBoostUntil = 0;
        logMessage(t('log_boosterEnd'));
      }
      if (timestamp - lastSpawnTime >= FISH_SPAWN_INTERVAL) {
        addNewFish(1); lastSpawnTime = timestamp;
      }

      eatEffects.forEach(effect => effect.timer -= dt);
      eatEffects = eatEffects.filter(effect => effect.timer > 0);

      // Условие победы:
      // 1) игрок достиг максимального размера (100) — финальная победа;
      // 2) пока игрок жив, на карте остались только союзники.
      if (!player.isDead && player.size >= MAX_SIZE) gameWon = true;
      if (ALPHA_FISH && !player.isDead) {
        const aliveAllies = otherFish.filter(f => f.isAlpha).length;
        const aliveNonAllies = otherFish.length - aliveAllies;
        if (aliveAllies > 0 && aliveNonAllies === 0) gameWon = true;
      }
    }

    // ===== Отрисовка =====
    // Стрелки от entity ко всем релевантным сущностям + wall-avoidance вектор.
    function drawArrow(fromX, fromY, toX, toY, color, width, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha !== undefined ? alpha : 1;
      ctx.strokeStyle = color;
      ctx.lineWidth = (width !== undefined ? width : 1.5) / SCALE;
      ctx.beginPath();
      ctx.moveTo(fromX, fromY);
      ctx.lineTo(toX, toY);
      ctx.stroke();
      const dx = toX - fromX, dy = toY - fromY;
      const a = Math.atan2(dy, dx);
      const headLen = 6 / SCALE;
      ctx.beginPath();
      ctx.moveTo(toX, toY);
      ctx.lineTo(toX - headLen * Math.cos(a - Math.PI / 6), toY - headLen * Math.sin(a - Math.PI / 6));
      ctx.moveTo(toX, toY);
      ctx.lineTo(toX - headLen * Math.cos(a + Math.PI / 6), toY - headLen * Math.sin(a + Math.PI / 6));
      ctx.stroke();
      ctx.restore();
    }
    function drawAIDebug(entity, timestamp) {
      if (!debugAI) return;
      const detection = getDetectionRadius(entity.size, entity === player || entity.isAlpha);
      // 1. Все угрозы (красные тонкие) и добычи (зелёные тонкие) в радиусе видимости.
      for (const o of otherFish) {
        if (o === entity || o.isShielded) continue;
        const dx = o.x - entity.x, dy = o.y - entity.y;
        const d = Math.hypot(dx, dy);
        if (d <= 0 || d >= detection) continue;
        if (o.size > entity.size) drawArrow(entity.x, entity.y, o.x, o.y, '#ff3b30', 0.8, 0.45);
        else if (o.size < entity.size) drawArrow(entity.x, entity.y, o.x, o.y, '#34c759', 0.8, 0.35);
      }
      // 2. Главная угроза/добыча — толстым.
      if (entity.threat && otherFish.includes(entity.threat)) {
        drawArrow(entity.x, entity.y, entity.threat.x, entity.threat.y, '#ff3b30', 1.6, 0.85);
      }
      if (entity.prey && otherFish.includes(entity.prey)) {
        const blink = (Math.sin(timestamp / 100) + 1) * 0.5 * 0.5 + 0.5;
        drawArrow(entity.x, entity.y, entity.prey.x, entity.prey.y, '#34c759', 1.6, blink);
      }
      // 3. Wall-avoidance — фиолетовая стрелка от рыбы к проекции стен.
      const r = getRadius(entity.size);
      const wn = wallAvoidance(entity.x, entity.y, r);
      const wnMag = Math.hypot(wn.x, wn.y);
      if (wnMag > 0.05) {
        const len = 18;
        drawArrow(entity.x, entity.y, entity.x + wn.x / wnMag * len, entity.y + wn.y / wnMag * len, '#9b59b6', 1.4, 0.9);
      }
      // 4. Радиус видимости (тонкий пунктир).
      ctx.save();
      ctx.globalAlpha = 0.2;
      ctx.setLineDash([4, 6]);
      ctx.beginPath();
      ctx.arc(entity.x, entity.y, detection, 0, 2 * Math.PI);
      ctx.strokeStyle = entity === player ? '#a16eff' : (entity.isAlpha ? '#0a84ff' : '#888');
      ctx.lineWidth = 1 / SCALE;
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }

    function drawEatEffect(effect) {
      ctx.save();
      ctx.globalAlpha = effect.timer / FLASH_DURATION * 0.5;
      const radius = getRadius(effect.size);
      const particleCount = effect.size > 10 ? 15 : 5;
      for (let i = 0; i < particleCount; i++) {
        const angle = Math.random() * 2 * Math.PI;
        const dist = Math.random() * radius;
        const particleSize = Math.random() * 3 + 1;
        ctx.beginPath();
        ctx.arc(effect.x + Math.cos(angle) * dist, effect.y + Math.sin(angle) * dist, particleSize, 0, 2 * Math.PI);
        ctx.fillStyle = 'rgba(255, 0, 0, 0.7)'; ctx.fill();
      }
      ctx.restore();
    }

    function drawWorld(timestamp) {
      // Атмосферные пузырьки за рыбами.
      bubbles.forEach(b => {
        ctx.beginPath();
        ctx.fillStyle = `rgba(255,255,255,${b.alpha})`;
        ctx.arc(b.x, b.y, b.r, 0, 2 * Math.PI);
        ctx.fill();
      });

      // Стильная рамка мира: внешний свет + двойной контур.
      const wlw = 2 / SCALE;
      ctx.save();
      // лёгкое свечение по краю
      ctx.shadowColor = 'rgba(10,80,160,0.35)';
      ctx.shadowBlur = 12;
      ctx.strokeStyle = 'rgba(20,90,160,0.55)';
      ctx.lineWidth = wlw * 1.4;
      ctx.strokeRect(-WORLD_SIZE, -WORLD_SIZE, WORLD_SIZE * 2, WORLD_SIZE * 2);
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
      // тёплая внутренняя рамка-обводка
      ctx.strokeStyle = 'rgba(255,255,255,0.45)';
      ctx.lineWidth = wlw * 0.6;
      ctx.strokeRect(-WORLD_SIZE + 1.2, -WORLD_SIZE + 1.2, WORLD_SIZE * 2 - 2.4, WORLD_SIZE * 2 - 2.4);
      // тонкая красная «зона смерти» снаружи (намёк на границу)
      ctx.strokeStyle = 'rgba(255,59,48,0.45)';
      ctx.lineWidth = wlw * 0.7;
      ctx.setLineDash([3, 4]);
      ctx.strokeRect(-WORLD_SIZE - 0.6, -WORLD_SIZE - 0.6, WORLD_SIZE * 2 + 1.2, WORLD_SIZE * 2 + 1.2);
      ctx.setLineDash([]);
      ctx.restore();

      if (debugAI) {
        if (!player.isDead) {
          const playerRunData = calculateAutopilotVector(player, timestamp, otherFish);
          player.threat = playerRunData.threat; player.prey = playerRunData.prey;
          drawAIDebug(player, timestamp);
        }
        otherFish.forEach(fish => {
          // Для всех рыб (не только альф) теперь показываем вектора.
          if (fish.isAlpha) {
            const d = calculateAutopilotVector(fish, timestamp, otherFish);
            fish.threat = d.threat; fish.prey = d.prey;
          }
          drawAIDebug(fish, timestamp);
        });
      }

      if (!player.isDead) {
        ctx.save();
        const pr = getRadius(player.size);
        // Игрок — ярко мерцающий фиолетовый круг (двойная пульсация
        // + ореол + плавающий hue для максимальной заметности).
        const t1 = Math.sin(timestamp / 180);
        const t2 = Math.sin(timestamp / 320);
        const lightness = 55 + 18 * t1;          // 37 — 73
        const hueShift = 285 + 18 * t2;          // 267 — 303
        // Внешний ореол свечения.
        const haloR = pr + 4 + 2 * (0.5 + 0.5 * t1);
        ctx.save();
        const grad = ctx.createRadialGradient(player.x, player.y, pr * 0.6, player.x, player.y, haloR);
        grad.addColorStop(0, `hsla(${hueShift}, 90%, ${lightness}%, 0.45)`);
        grad.addColorStop(1, `hsla(${hueShift}, 90%, ${lightness}%, 0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(player.x, player.y, haloR, 0, 2 * Math.PI);
        ctx.fill();
        ctx.restore();
        // Тело игрока.
        ctx.beginPath();
        ctx.arc(player.x, player.y, pr, 0, 2 * Math.PI);
        ctx.fillStyle = `hsla(${hueShift}, 92%, ${lightness}%, 0.95)`;
        ctx.fill();
        // Внутренний блик для дополнительного «жизненного» мерцания.
        ctx.beginPath();
        ctx.arc(player.x - pr * 0.3, player.y - pr * 0.3, pr * 0.45, 0, 2 * Math.PI);
        ctx.fillStyle = `hsla(${hueShift + 15}, 95%, ${Math.min(85, lightness + 22)}%, ${0.35 + 0.18 * t2})`;
        ctx.fill();
        // Статусные обводки игрока — концентрические.
        const pStat = [];
        if (player.isShielded) pStat.push('rgba(255,204,0,0.95)');
        if (player.speedBoostUntil > timestamp) pStat.push('rgba(95,189,255,0.95)');
        ctx.lineWidth = 1.5;
        for (let i = 0; i < pStat.length; i++) {
          ctx.beginPath();
          ctx.arc(player.x, player.y, pr + 1.2 + i * 2.2, 0, 2 * Math.PI);
          ctx.strokeStyle = pStat[i];
          ctx.stroke();
        }
        if (debugAI) {
          ctx.font = '6px -apple-system, Helvetica Neue, sans-serif';
          ctx.fillStyle = '#fff';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 2;
          ctx.fillText(Math.floor(player.size), player.x, player.y);
          ctx.textBaseline = 'alphabetic';
          ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
        }
        ctx.restore();
      }

      otherFish.forEach(fish => {
        ctx.save();
        if (timestamp - fish.spawnTime < SPAWN_IMMUNITY_MS) ctx.globalAlpha = 0.5;
        // Коричневый след у больной рыбы — видимая «болезненная» дорожка.
        if (fish.isSick && fish.trace && fish.trace.length > 1) {
          ctx.save();
          ctx.globalAlpha = 0.5;
          ctx.beginPath();
          ctx.moveTo(fish.trace[0].x, fish.trace[0].y);
          for (let i = 1; i < fish.trace.length; i++) ctx.lineTo(fish.trace[i].x, fish.trace[i].y);
          ctx.strokeStyle = 'rgba(139,69,19,0.9)';
          ctx.lineWidth = 1.4 / SCALE;
          ctx.stroke();
          ctx.restore();
        }
        const fr = getRadius(fish.size);
        // Заливка по типу: альфа — синий, больше игрока — красный, меньше — зелёный.
        let fill;
        if (fish.isAlpha) fill = 'rgba(10,132,255,0.85)';
        else if (fish.size > player.size) fill = 'rgba(255,59,48,0.8)';
        else fill = 'rgba(52,199,89,0.8)';
        ctx.beginPath();
        ctx.arc(fish.x, fish.y, fr, 0, 2 * Math.PI);
        ctx.fillStyle = fill;
        ctx.fill();
        // Статусные обводки рыбы — концентрические, можно несколько одновременно.
        const stat = [];
        if (fish.isShielded) stat.push('rgba(255,204,0,0.95)');
        if (fish.isSick) stat.push('rgba(139,69,19,0.95)');
        if (fish.isSafe) stat.push('rgba(52,199,89,0.95)');
        if (fish.speedBoostUntil && fish.speedBoostUntil > timestamp) stat.push('rgba(95,189,255,0.95)');
        ctx.lineWidth = 1.4;
        for (let i = 0; i < stat.length; i++) {
          ctx.beginPath();
          ctx.arc(fish.x, fish.y, fr + 1.2 + i * 2, 0, 2 * Math.PI);
          ctx.strokeStyle = stat[i];
          ctx.stroke();
        }
        if (debugAI) {
          ctx.font = '6px -apple-system, Helvetica Neue, sans-serif';
          ctx.fillStyle = '#fff';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 2;
          ctx.fillText(Math.floor(fish.size), fish.x, fish.y);
          ctx.textBaseline = 'alphabetic';
          ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
        }
        ctx.restore();
      });

      shields.forEach(shield => {
        const life = performance.now() - shield.spawnTime;
        let alpha = Math.max(0, 1 - life / SHIELD_DURATION);
        const pulse = 1 + 0.1 * Math.sin(timestamp / 200);
        const s = 5 * pulse;
        ctx.save();
        ctx.translate(shield.x, shield.y);
        // Геральдический щит: округлый верх, заострённое дно.
        ctx.beginPath();
        ctx.moveTo(-s, -s * 0.55);
        ctx.quadraticCurveTo(0, -s * 0.85, s, -s * 0.55);
        ctx.lineTo(s, s * 0.15);
        ctx.quadraticCurveTo(s * 0.55, s * 1.05, 0, s * 1.15);
        ctx.quadraticCurveTo(-s * 0.55, s * 1.05, -s, s * 0.15);
        ctx.closePath();
        ctx.fillStyle = `rgba(255,204,0,${alpha})`;
        ctx.fill();
        ctx.lineWidth = 1.2;
        ctx.strokeStyle = `rgba(180,120,0,${alpha})`;
        ctx.stroke();
        // Декоративная вертикальная линия.
        ctx.beginPath();
        ctx.moveTo(0, -s * 0.5);
        ctx.lineTo(0, s * 0.95);
        ctx.lineWidth = 0.6;
        ctx.strokeStyle = `rgba(255,149,0,${alpha * 0.7})`;
        ctx.stroke();
        ctx.restore();
      });

      // Бустер скорости — настоящая голубая молния (Z-форма) со свечением
      speedBoosters.forEach(b => {
        const life = performance.now() - b.spawnTime;
        const fadeAlpha = Math.max(0.35, 1 - life / SPEED_BOOSTER_VISIBLE_DURATION);
        const pulse = 1 + 0.15 * Math.sin(timestamp / 140);
        ctx.save();
        ctx.translate(b.x, b.y);
        // мягкий ореол + дополнительное свечение
        ctx.beginPath();
        ctx.arc(0, 0, 8 * pulse, 0, 2 * Math.PI);
        ctx.fillStyle = `rgba(95,189,255,${0.18 * fadeAlpha})`;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(0, 0, 5.5 * pulse, 0, 2 * Math.PI);
        ctx.fillStyle = `rgba(120,200,255,${0.22 * fadeAlpha})`;
        ctx.fill();
        // Молния: Z-образная форма из 6 вершин (Material Icons "bolt")
        // Верхний кончик справа, нижний кончик слева, классический зигзаг.
        const s = 0.65 * pulse;
        ctx.beginPath();
        ctx.moveTo(-5 * s,  9 * s); // нижний-левый кончик
        ctx.lineTo( 5 * s,  0    ); // диагональ вверх-вправо
        ctx.lineTo( 0    ,  0    ); // ступенька-надрез влево
        ctx.lineTo( 4 * s, -9 * s); // диагональ вверх до верхнего-правого кончика
        ctx.lineTo(-4 * s,  0    ); // диагональ вниз-влево
        ctx.lineTo( 1 * s,  0    ); // ступенька-надрез вправо
        ctx.closePath();
        // обводка снаружи
        ctx.lineJoin = 'round';
        ctx.lineWidth = 1.2;
        ctx.strokeStyle = `rgba(10,120,216,${fadeAlpha})`;
        ctx.stroke();
        // заливка
        ctx.fillStyle = `rgba(95,189,255,${fadeAlpha})`;
        ctx.fill();
        // яркая внутренняя жилка (поменьше) для эффекта свечения
        ctx.beginPath();
        const si = 0.4 * pulse;
        ctx.moveTo(-5 * si,  9 * si);
        ctx.lineTo( 5 * si,  0    );
        ctx.lineTo( 0     ,  0    );
        ctx.lineTo( 4 * si, -9 * si);
        ctx.lineTo(-4 * si,  0    );
        ctx.lineTo( 1 * si,  0    );
        ctx.closePath();
        ctx.fillStyle = `rgba(230,245,255,${0.85 * fadeAlpha})`;
        ctx.fill();
        ctx.restore();
      });

      // Таблетка-капсула: красный + белый, лёгкий пульс.
      pills.forEach(p => {
        const life = performance.now() - p.spawnTime;
        const fadeAlpha = Math.max(0.4, 1 - life / PILL_VISIBLE_DURATION);
        const pulse = 1 + 0.08 * Math.sin(timestamp / 250);
        const w = 4.5 * pulse, h = 2.3 * pulse;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(-0.35);
        // Красная половина
        ctx.beginPath();
        ctx.moveTo(0, -h);
        ctx.lineTo(-w + h, -h);
        ctx.arc(-w + h, 0, h, -Math.PI / 2, Math.PI / 2, true);
        ctx.lineTo(0, h);
        ctx.closePath();
        ctx.fillStyle = `rgba(225,60,60,${fadeAlpha})`;
        ctx.fill();
        // Белая половина
        ctx.beginPath();
        ctx.moveTo(0, -h);
        ctx.lineTo(w - h, -h);
        ctx.arc(w - h, 0, h, -Math.PI / 2, Math.PI / 2);
        ctx.lineTo(0, h);
        ctx.closePath();
        ctx.fillStyle = `rgba(255,255,255,${fadeAlpha})`;
        ctx.fill();
        // Контур
        ctx.beginPath();
        ctx.moveTo(-w + h, -h);
        ctx.lineTo(w - h, -h);
        ctx.arc(w - h, 0, h, -Math.PI / 2, Math.PI / 2);
        ctx.lineTo(-w + h, h);
        ctx.arc(-w + h, 0, h, Math.PI / 2, -Math.PI / 2);
        ctx.lineWidth = 0.6;
        ctx.strokeStyle = `rgba(120,30,30,${fadeAlpha})`;
        ctx.stroke();
        ctx.restore();
      });

      eatEffects.forEach(drawEatEffect);

      // Брызги (кровавые при гибели союзника, любого цвета по параметру).
      splashes.forEach(s => {
        const k = 1 - s.life / s.maxLife;
        ctx.beginPath();
        const c = s.color || 'rgba(200,30,30,';
        ctx.fillStyle = c + (0.85 * k) + ')';
        ctx.arc(s.x, s.y, 1.2 + 1.6 * k, 0, 2 * Math.PI);
        ctx.fill();
      });
    }

    // ===== HUD =====
    function updateHUD() {
      const sz = player.isDead ? 0 : player.size;
      sizeValue.textContent = player.isDead ? t('dead') : `${Math.floor(sz)} / 100`;
      const now = performance.now();
      shieldBadge.hidden = !player.isShielded;
      boosterBadge.hidden = !(player.speedBoostUntil > now);
    }

    function animate(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
      lastTime = timestamp;
      // Игровая логика паузится при game-over/win — но цикл анимации
      // продолжается, чтобы корректно перерисовываться при ресайзе окна.
      if (!gameOver && !gameWon) update(dt, timestamp);

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Интро: приближение камеры на игрока, плавное отдаление.
      // Машина состояний: 'wait' — ждём клик «В БОЙ!»; 'hold' — автопауза
      // на рестарте; 'zoom' — плавный отдалённый зум; 'none' — обычная игра.
      let zoomFactor = 1;
      let cameraOnPlayer = false;
      const introActive = introPhase !== 'none';
      if (introPhase === 'wait') {
        zoomFactor = 4;
        cameraOnPlayer = true;
      } else if (introPhase === 'hold') {
        zoomFactor = 4;
        cameraOnPlayer = true;
        if (timestamp - introPhaseStart >= INTRO_HOLD_MS) {
          introPhase = 'zoom';
          introPhaseStart = timestamp;
        }
      } else if (introPhase === 'zoom') {
        const k = Math.min(1, (timestamp - introPhaseStart) / INTRO_ZOOM_MS);
        const e = 1 - Math.pow(1 - k, 3); // ease-out cubic
        zoomFactor = 4 - 3 * e;
        cameraOnPlayer = true;
        if (k >= 1) {
          introPhase = 'none';
          // После окончания зума — игра реально доступна.
          fireLoadingReadyOnce();
        }
      }
      const introElapsed = introPhaseStart ? timestamp - introPhaseStart : 0;

      ctx.save();
      ctx.translate(canvas.width / 2, canvas.height / 2);
      ctx.scale(SCALE * zoomFactor, SCALE * zoomFactor);
      if (cameraOnPlayer) {
        // Сдвигаем мир так, чтобы игрок оказался в центре экрана.
        // По мере zoomFactor → 1 этот сдвиг плавно становится 0
        // (умножаем на (zoomFactor - 1) / 3).
        const blend = Math.max(0, (zoomFactor - 1) / 3);
        ctx.translate(-player.x * blend, -player.y * blend);
      }
      drawWorld(timestamp);

      if (flashTimer > 0) {
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = EAT_FLASH_COLOR;
        ctx.beginPath();
        ctx.arc(flashX, flashY, getRadius(player.size) * 1.5, 0, 2 * Math.PI);
        ctx.fill();
        ctx.globalAlpha = 1;
        flashTimer -= dt;
      }
      ctx.restore();

      updateHUD();

      // Интро: стрелка к игроку и подпись «это ты». Затухает на zoom.
      if (introActive) {
        let labelAlpha;
        if (introPhase === 'wait' || introPhase === 'hold') labelAlpha = 1;
        else if (introPhase === 'zoom') labelAlpha = Math.max(0, 1 - introElapsed / (INTRO_ZOOM_MS * 0.6));
        else labelAlpha = 0;
        if (labelAlpha > 0.02) {
          ctx.save();
          ctx.globalAlpha = labelAlpha;
          const cx = canvas.width / 2;
          const cy = canvas.height / 2;
          // Подпись — сверху-справа от центра.
          const dx = Math.round(canvas.height * 0.18);
          const dy = -Math.round(canvas.height * 0.16);
          ctx.font = `700 ${Math.round(canvas.height * 0.045)}px -apple-system, "Helvetica Neue", sans-serif`;
          ctx.fillStyle = '#d8230f';
          ctx.textAlign = 'left';
          ctx.shadowColor = 'rgba(255,255,255,0.85)';
          ctx.shadowBlur = 6;
          ctx.fillText(t('introYouAre'), cx + dx, cy + dy);
          ctx.shadowBlur = 0;
          // Стрелка от подписи к игроку (рукописная, с лёгкой кривизной).
          const startX = cx + dx - 6;
          const startY = cy + dy + 6;
          const endX = cx + Math.round(canvas.height * 0.04);
          const endY = cy - Math.round(canvas.height * 0.04);
          ctx.strokeStyle = '#d8230f';
          ctx.lineWidth = Math.max(2, Math.round(canvas.height * 0.005));
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(startX, startY);
          ctx.quadraticCurveTo(
            (startX + endX) / 2 + 30,
            (startY + endY) / 2 - 10,
            endX, endY
          );
          ctx.stroke();
          // Наконечник стрелки.
          const headLen = Math.max(8, canvas.height * 0.018);
          const a = Math.atan2(endY - ((startY + endY) / 2 - 10), endX - ((startX + endX) / 2 + 30));
          ctx.beginPath();
          ctx.moveTo(endX, endY);
          ctx.lineTo(endX - headLen * Math.cos(a - 0.45), endY - headLen * Math.sin(a - 0.45));
          ctx.moveTo(endX, endY);
          ctx.lineTo(endX - headLen * Math.cos(a + 0.45), endY - headLen * Math.sin(a + 0.45));
          ctx.stroke();
          ctx.restore();
        }
      }

      const allies = otherFish.filter(fish => fish.isAlpha);
      const allAlliesDead = allies.length === 0;

      if (gameOver && (!ALPHA_FISH || allAlliesDead)) {
        const cx = canvas.width / 2, cy = canvas.height / 2;
        ctx.font = `${Math.round(canvas.height * 0.06)}px -apple-system, "Helvetica Neue", sans-serif`;
        ctx.fillStyle = '#1c1d22';
        ctx.textAlign = 'center';
        ctx.fillText(t('gameOver'), cx, cy);
        ctx.font = `${Math.round(canvas.height * 0.025)}px -apple-system, sans-serif`;
        ctx.fillStyle = '#6b7280';
        ctx.fillText(t('restartHint'), cx, cy + Math.round(canvas.height * 0.05));
        if (retryBtn) retryBtn.hidden = false;
      } else if (gameWon) {
        const cx = canvas.width / 2, cy = canvas.height / 2;
        ctx.font = `${Math.round(canvas.height * 0.06)}px -apple-system, "Helvetica Neue", sans-serif`;
        ctx.fillStyle = '#34c759';
        ctx.textAlign = 'center';
        ctx.fillText(t('victory'), cx, cy);
        ctx.font = `${Math.round(canvas.height * 0.025)}px -apple-system, sans-serif`;
        ctx.fillStyle = '#6b7280';
        ctx.fillText(t('restartHint'), cx, cy + Math.round(canvas.height * 0.05));
        if (retryBtn) retryBtn.hidden = false;
      }
      // Цикл анимации ВСЕГДА работает — чтобы при изменении размеров окна
      // канвас корректно перерисовывался (требование п. 1.6.2.3).
      requestAnimationFrame(animate);
    }

    // ===== Yandex Games SDK + start =====
    function initYandexSDK() {
      if (typeof window.YaGames === 'undefined') {
        return Promise.resolve(null);
      }
      try {
        return window.YaGames.init({ orientation: { value: 'landscape', lock: true } })
          .then(sdk => { window._ysdk = sdk; return sdk; })
          .catch(err => { console.warn('YaGames.init error', err); return null; });
      } catch (e) {
        console.warn('YaGames init threw', e);
        return Promise.resolve(null);
      }
    }
    function fireLoadingReadyOnce() {
      if (loadingReadyFired) return;
      loadingReadyFired = true;
      try { notifyLoadingReady(); gameplayStart(); } catch (e) { /* noop */ }
    }
    function notifyLoadingReady() {
      const sdk = window._ysdk;
      try { sdk && sdk.features && sdk.features.LoadingAPI && sdk.features.LoadingAPI.ready(); }
      catch (e) { console.warn('LoadingAPI.ready failed', e); }
    }
    function gameplayStart() {
      const sdk = window._ysdk;
      try { sdk && sdk.features && sdk.features.GameplayAPI && sdk.features.GameplayAPI.start(); }
      catch (e) { /* noop */ }
    }
    function gameplayStop() {
      const sdk = window._ysdk;
      try { sdk && sdk.features && sdk.features.GameplayAPI && sdk.features.GameplayAPI.stop(); }
      catch (e) { /* noop */ }
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) gameplayStop(); else gameplayStart();
    });
    window.addEventListener('blur', gameplayStop);
    window.addEventListener('focus', gameplayStart);

    // Восстанавливаем сохранённое состояние свапа лево/право.
    try {
      if (localStorage.getItem('layoutSwapped') === '1') document.body.classList.add('is-layout-swapped');
    } catch (e) {}

    function bootstrap() {
      // Сначала инициализируем SDK (и ждём промис), чтобы корректно прочитать
      // язык из ysdk.environment.i18n.lang (требование Я.Игр п. 2.14).
      // ВАЖНО: detectLang() вызывается ПОСЛЕ resolve промиса SDK, чтобы
      // window._ysdk был выставлен.
      // LoadingAPI.ready() из Game Ready (требование п. 1.19) вызывается
      // только после окончания стартовой интро-анимации — в момент, когда
      // пользователь действительно может играть, а не на «загрузке».
      const runGame = () => {
        try {
          // Авто-определение языка через SDK (если SDK не доступен —
          // fallback на navigator.language).
          LANG = detectLang();
          applyI18n();
          resizeCanvas();
          initBubbles();
          generateInitialFish();
          // Первый запуск: ждём клик «В БОЙ!». Отдаление и старт игры —
          // только после нажатия кнопки.
          introPhase = 'wait';
          introPhaseStart = performance.now();
          lastTime = introPhaseStart;
          if (introStartBtn) introStartBtn.hidden = false;
          if (retryBtn) retryBtn.hidden = true;
          requestAnimationFrame(animate);
          // Игра загружена и ждёт нажатия — это и есть «доступна для игры».
          fireLoadingReadyOnce();
        } catch (e) {
          console.error('Bootstrap failed:', e);
          if (typeof logDiv !== 'undefined' && logDiv) {
            logDiv.innerHTML = '<div style="color:#d8230f;font-weight:700;white-space:pre-wrap;font-family:monospace">Bootstrap error:\n' + (e && e.stack ? e.stack : String(e)) + '</div>';
          }
          // Fallback: всё равно сообщим Game Ready, чтобы не остался лоадер.
          setTimeout(() => { try { fireLoadingReadyOnce(); } catch (e2) {} }, 100);
        }
      };
      // Дождаться SDK (с таймаутом 3 сек на случай долгой загрузки /sdk.js),
      // затем запустить игру.
      let started = false;
      const startOnce = () => { if (!started) { started = true; runGame(); } };
      initYandexSDK().then(startOnce).catch(startOnce);
      // Страховка: если SDK не отвечает — стартуем без него через 3 сек.
      setTimeout(startOnce, 3000);
    }

    // Service Worker регистрируется только в безопасном HTTPS-контексте
    // (для PWA-установки и TWA Google Play). На file:// и в Capacitor
    // регистрация пропускается без ошибок.
    if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
      navigator.serviceWorker.register('service-worker.js').catch(() => {});
    }

    // Стартуем после готовности DOM и одного кадра layout.
    function startWhenReady() {
      requestAnimationFrame(() => requestAnimationFrame(bootstrap));
    }
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      startWhenReady();
    } else {
      document.addEventListener('DOMContentLoaded', startWhenReady);
    }
  </script>
</body>
</html>
